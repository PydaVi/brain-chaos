apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: falco
  namespace: lab-security
  labels:
    app.kubernetes.io/name: falco
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: falco
  template:
    metadata:
      labels:
        app.kubernetes.io/name: falco
    spec:
      serviceAccountName: falco
      # Falco precisa ver processos do host (syscalls) no nó.
      hostPID: true
      containers:
        - name: falco
          image: falcosecurity/falco:0.38.2
          imagePullPolicy: IfNotPresent
          env:
            # Indica ao Falco onde está o rootfs do host para mapear paths.
            - name: HOST_ROOT
              value: /host
          securityContext:
            # Necessário para acessar hooks de kernel / eBPF.
            privileged: true
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi
          volumeMounts:
            # Acesso aos dispositivos e interfaces do kernel.
            - name: dev-fs
              mountPath: /dev
            # Acesso às informações de processos do host.
            - name: proc-fs
              mountPath: /proc
            # Acesso aos módulos do kernel (driver/eBPF).
            - name: modules
              mountPath: /lib/modules
            # Código-fonte do kernel, necessário em alguns modos.
            - name: usr-src
              mountPath: /usr/src
            # Acesso ao tracefs do host (eventos eBPF).
            - name: trace-fs
              mountPath: /sys/kernel/tracing
              readOnly: true
            # Acesso aos BTFs do kernel (modern eBPF).
            - name: btf
              mountPath: /sys/kernel/btf
              readOnly: true
            # Rootfs do host para resolver caminhos absolutos.
            - name: host-proc
              mountPath: /host/proc
              readOnly: true
            - name: host-etc
              mountPath: /host/etc
              readOnly: true
            # Configuração e regras.
            - name: falco-rules-local
              mountPath: /etc/falco/falco_rules.local.yaml
              subPath: falco_rules.local.yaml
      volumes:
        - name: dev-fs
          hostPath:
            path: /dev
        - name: proc-fs
          hostPath:
            path: /proc
        - name: modules
          hostPath:
            path: /lib/modules
        - name: usr-src
          hostPath:
            path: /usr/src
        - name: trace-fs
          hostPath:
            path: /sys/kernel/tracing
        - name: btf
          hostPath:
            path: /sys/kernel/btf
        - name: host-proc
          hostPath:
            path: /proc
        - name: host-etc
          hostPath:
            path: /etc
        - name: falco-rules-local
          configMap:
            name: falco-rules-local

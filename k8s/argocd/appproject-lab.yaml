apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: brain-chaos-lab
  namespace: argocd
spec:
  description: Brain Chaos local learning project
  sourceRepos:
    - '*'
  destinations:
    - namespace: lab-app
      server: https://kubernetes.default.svc
    - namespace: lab-observability
      server: https://kubernetes.default.svc
    - namespace: lab-chaos
      server: https://kubernetes.default.svc
    - namespace: lab-security
      server: https://kubernetes.default.svc
    - namespace: lab-redteam
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: ''
      kind: Namespace
    - group: rbac.authorization.k8s.io
      kind: ClusterRole
    - group: rbac.authorization.k8s.io
      kind: ClusterRoleBinding
  namespaceResourceWhitelist:
    - group: '*'
      kind: '*'

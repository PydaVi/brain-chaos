apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: lab-falco
  namespace: argocd
spec:
  project: lab
  source:
    repoURL: https://github.com/pydavi/brain-chaos.git
    targetRevision: main
    path: k8s/security/falco
  destination:
    server: https://kubernetes.default.svc
    namespace: lab-security
  syncPolicy:
    automated:
      prune: true
      selfHeal: true

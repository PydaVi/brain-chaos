apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: lab-observability
data:
  lab-app-overview.json: |
    {
      "annotations": {"list": []},
      "editable": true,
      "graphTooltip": 0,
      "id": null,
      "links": [],
      "panels": [
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {}, "overrides": []},
          "gridPos": {"h": 8, "w": 24, "x": 0, "y": 0},
          "id": 1,
          "options": {"legend": {"displayMode": "table", "placement": "bottom"}, "tooltip": {"mode": "single"}},
          "targets": [
            {"expr": "probe_success{job=\"blackbox-http\"}", "legendFormat": "{{instance}}", "refId": "A"}
          ],
          "title": "Lab Services Availability",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {}, "overrides": []},
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 8},
          "id": 2,
          "options": {"legend": {"displayMode": "list", "placement": "bottom"}, "tooltip": {"mode": "single"}},
          "targets": [
            {"expr": "probe_duration_seconds{job=\"blackbox-http\"}", "legendFormat": "{{instance}}", "refId": "A"}
          ],
          "title": "Probe Duration (s)",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {}, "overrides": []},
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 8},
          "id": 3,
          "options": {"legend": {"displayMode": "list", "placement": "bottom"}, "tooltip": {"mode": "single"}},
          "targets": [
            {"expr": "kube_pod_container_status_restarts_total{namespace=~\"lab-.*\"}", "legendFormat": "{{namespace}}/{{pod}}", "refId": "A"}
          ],
          "title": "Container Restarts (all lab namespaces)",
          "type": "timeseries"
        }
      ],
      "refresh": "15s",
      "schemaVersion": 39,
      "style": "dark",
      "tags": ["k8s", "lab", "overview"],
      "templating": {"list": []},
      "time": {"from": "now-30m", "to": "now"},
      "timezone": "browser",
      "title": "Lab App Overview",
      "uid": "lab-app-overview",
      "version": 2,
      "weekStart": ""
    }

  service-latency-error.json: |
    {
      "annotations": {"list": []},
      "editable": true,
      "graphTooltip": 0,
      "id": null,
      "links": [],
      "panels": [
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {}, "overrides": []},
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 0},
          "id": 1,
          "options": {"legend": {"displayMode": "table", "placement": "bottom"}, "tooltip": {"mode": "single"}},
          "targets": [
            {"expr": "avg_over_time(probe_duration_seconds{job=\"blackbox-http\"}[5m])", "legendFormat": "{{instance}}", "refId": "A"}
          ],
          "title": "Avg Latency 5m (s)",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {}, "overrides": []},
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 0},
          "id": 2,
          "options": {"legend": {"displayMode": "table", "placement": "bottom"}, "tooltip": {"mode": "single"}},
          "targets": [
            {"expr": "(1 - avg_over_time(probe_success{job=\"blackbox-http\"}[5m])) * 100", "legendFormat": "{{instance}}", "refId": "A"}
          ],
          "title": "Error Rate 5m (%)",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {}, "overrides": []},
          "gridPos": {"h": 8, "w": 24, "x": 0, "y": 8},
          "id": 3,
          "options": {
            "footer": {"countRows": false, "fields": "", "reducer": ["sum"], "show": false},
            "showHeader": true
          },
          "targets": [
            {"expr": "probe_success{job=\"blackbox-http\"}", "format": "table", "instant": true, "refId": "A"}
          ],
          "title": "Current Probe Status",
          "transformations": [{"id": "labelsToFields", "options": {"mode": "columns"}}],
          "type": "table"
        }
      ],
      "refresh": "15s",
      "schemaVersion": 39,
      "style": "dark",
      "tags": ["k8s", "latency", "error", "synthetic"],
      "templating": {"list": []},
      "time": {"from": "now-30m", "to": "now"},
      "timezone": "browser",
      "title": "Service Latency & Error (Synthetics)",
      "uid": "service-latency-error",
      "version": 1,
      "weekStart": ""
    }

  k8s-workload-health.json: |
    {
      "annotations": {"list": []},
      "editable": true,
      "graphTooltip": 0,
      "id": null,
      "links": [],
      "panels": [
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},

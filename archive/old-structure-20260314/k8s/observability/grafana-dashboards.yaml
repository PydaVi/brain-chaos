          "options": {"legend": {"displayMode": "table", "placement": "bottom"}, "tooltip": {"mode": "single"}},
          "targets": [
            {"expr": "kube_pod_container_status_restarts_total{namespace=~\"lab-.*\"}", "legendFormat": "{{namespace}}/{{pod}}", "refId": "A"}
          ],
          "title": "Container Restarts",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {}, "overrides": []},
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 8},
          "id": 2,
          "options": {"legend": {"displayMode": "table", "placement": "bottom"}, "tooltip": {"mode": "single"}},
          "targets": [
            {"expr": "kube_deployment_status_replicas_available{namespace=~\"lab-.*\"}", "legendFormat": "{{namespace}}/{{deployment}}", "refId": "A"}
          ],
          "title": "Deployment Replicas Available",

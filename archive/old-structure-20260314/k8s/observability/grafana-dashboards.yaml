          "options": {"legend": {"displayMode": "table", "placement": "bottom"}, "tooltip": {"mode": "single"}},
          "targets": [
            {"expr": "kube_statefulset_status_replicas_ready{namespace=~\"lab-.*\"}", "legendFormat": "{{namespace}}/{{statefulset}}", "refId": "A"}
          ],

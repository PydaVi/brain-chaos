          "options": {"legend": {"displayMode": "table", "placement": "bottom"}, "tooltip": {"mode": "single"}},
          "targets": [
            {"expr": "sum by (namespace, pod) (kube_pod_container_resource_requests{resource=\"cpu\", namespace=~\"lab-.*\"})", "legendFormat": "{{namespace}}/{{pod}}", "refId": "A"}

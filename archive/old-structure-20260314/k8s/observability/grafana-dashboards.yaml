          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 8},
          "id": 4,
          "options": {"legend": {"displayMode": "table", "placement": "bottom"}, "tooltip": {"mode": "single"}},
          "targets": [
            {"expr": "sum by (namespace, pod) (kube_pod_container_resource_limits{resource=\"memory\", namespace=~\"lab-.*\"})", "legendFormat": "{{namespace}}/{{pod}}", "refId": "A"}

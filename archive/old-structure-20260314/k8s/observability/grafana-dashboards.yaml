      ],
      "refresh": "15s",
      "schemaVersion": 39,
      "style": "dark",
      "tags": ["k8s", "health", "restarts"],
      "templating": {"list": []},
      "time": {"from": "now-30m", "to": "now"},
      "timezone": "browser",
      "title": "K8s Workload Health (Restarts/Status)",
      "uid": "k8s-workload-health",
      "version": 1,
      "weekStart": ""

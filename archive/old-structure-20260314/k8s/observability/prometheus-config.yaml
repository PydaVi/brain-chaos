apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: lab-observability
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      - job_name: prometheus
        static_configs:
          - targets:
              - localhost:9090

      - job_name: kube-state-metrics
        static_configs:
          - targets:
              - kube-state-metrics.lab-observability.svc.cluster.local:8080

      - job_name: blackbox-http
        metrics_path: /probe
        params:
          module: [http_2xx]
        static_configs:
          - targets:
              - http://web-frontend.lab-app.svc.cluster.local:80
              - http://api-gateway.lab-app.svc.cluster.local:80
              - http://orders-service.lab-app.svc.cluster.local:80
              - http://catalog-service.lab-app.svc.cluster.local:80
              - http://payments-mock.lab-app.svc.cluster.local:80
        relabel_configs:
          - source_labels: [__address__]
            target_label: __param_target
          - source_labels: [__param_target]
            target_label: instance
          - target_label: __address__
            replacement: blackbox-exporter.lab-observability.svc.cluster.local:9115
